apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "-1"

spec:
  project: default

  sources:

    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 76.2.1

      helm:
        releaseName: monitoring
        valueFiles:
          - $values/argocd/values/monitoring-values.yaml

    - repoURL: git@github.com:infrabyte/capitec.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true