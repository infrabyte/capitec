apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: capitec
  namespace: capitec
spec:
  ingressClassName: nginx

  rules:
  - host: capitec.jumphost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: capitec-devops-cyber-assessment
            port:
              number: 5000
